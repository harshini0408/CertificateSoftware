server {
    listen 80;
    server_name certs.psgit.edu;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name certs.psgit.edu;

    # ── SSL (replace with your actual cert paths) ────────────────────
    ssl_certificate     /etc/ssl/certs/psgit_cert.pem;
    ssl_certificate_key /etc/ssl/private/psgit_key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Request limits ───────────────────────────────────────────────
    client_max_body_size 20M;

    # ── API backend (FastAPI / Uvicorn) ──────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Public verify endpoint (no /api prefix for clean URLs) ───────
    location /verify/ {
        proxy_pass         http://127.0.0.1:8000/verify/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API docs (development only — remove in production) ──────────
    location /docs {
        proxy_pass         http://127.0.0.1:8000/docs;
        proxy_set_header   Host $host;
    }

    location /openapi.json {
        proxy_pass         http://127.0.0.1:8000/openapi.json;
        proxy_set_header   Host $host;
    }

    # ── Frontend (Vite / static build) ───────────────────────────────
    location / {
        root  /var/www/psgicerts/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Static certificate PNGs (optional direct serve) ──────────────
    location /storage/ {
        alias /var/www/psgicerts/storage/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"       always;
    add_header X-Content-Type-Options "nosniff"           always;
    add_header X-XSS-Protection       "1; mode=block"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
